<!doctype html>
<html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medikonda PDF Generator</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png?v=medikonda-v3" />
  <link rel="shortcut icon" type="image/png" href="/assets/favicon.png?v=medikonda-v3" />
  <link rel="apple-touch-icon" href="/assets/favicon.png?v=medikonda-v3" />
  <link rel="stylesheet" href="/static/styles.css?v=product-spec-no-results-v2" />
</head>
  <body>
    <header class="topbar">
      <img src="/assets/medikonda_logo.png" alt="Medikonda" />
      <div>
        <h1>Medikonda PDF Generator</h1>
        <p>Instant COAs and Product Spec PDFs</p>
      </div>
    </header>

    <main class="container">
      <section class="panel actions-panel">
        <div class="row">
          <label>Saved Records</label>
          <select id="recordSelect">
            <option value="">Select saved record...</option>
          </select>
          <button id="newBtn">New</button>
          <button id="saveBtn">Save</button>
          <button id="generateBtn" class="primary">Generate PDF</button>
        </div>
        <div id="status" class="status"></div>
      </section>

      <section class="panel">
        <h2>Document Setup</h2>
        <div class="grid two">
          <label>
            Template Preset
            <select id="templatePreset"></select>
          </label>

          <label>
            Document Title
            <select id="documentTitle">
              <option value="CERTIFICATE OF ANALYSIS">
                CERTIFICATE OF ANALYSIS
              </option>
              <option value="PRODUCT SPECIFICATION SHEET">
                PRODUCT SPECIFICATION SHEET
              </option>
            </select>
          </label>

          
        </div>
        <p class="fixed-branding-note">
          Logo and boundary color are fixed to Medikonda branding for consistent
          PDF output.
        </p>
      </section>

      <section class="panel fields-panel">
        <div class="section-header">
          <h2>Product / Document Fields</h2>
          <div>
            <button id="addFieldBtn">Add Field</button>
            <button id="removeFieldBtn">Remove Selected</button>
          </div>
        </div>

        <div class="table-wrap tall">
          <table id="fieldsTable" class="editable-table">
            <thead>
              <tr>
                <th class="handle-head">Move</th>
                <th>Field Name</th>
                <th>Field Value</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel sections-panel">
        <div class="section-header">
          <h2>Sections / Tables</h2>
          <div>
            <button id="addSectionBtn">Add Section</button>
            <button id="removeSectionBtn">Remove Section</button>
          </div>
        </div>

        <div id="sectionTabs" class="tabs"></div>

        <div class="section-tools">
          <button id="renameSectionBtn">Rename Section</button>
          <button id="addRowBtn">Add Row</button>
          <button id="removeRowBtn">Remove Row</button>
          <button id="addColumnBtn">Add Column</button>
          <button id="removeColumnBtn">Remove Column</button>
          <button id="editColumnsBtn">Edit Column Names</button>
        </div>

        <div id="sectionEditor" class="table-wrap section-editor"></div>
      </section>
    </main>

    <script src="/static/app.js?v=product-spec-no-results-v1"></script>
  </body>
</html>
